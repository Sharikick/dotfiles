# #######################################################################################
# AUTOGENERATED HYPR CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hypr.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

# autogenerated = 1 # remove this line to remove the warning

monitor=,preferred,auto,1

$terminal = alacritty
$fileManager = dolphin
$menu = wofi --show drun
$browser = firefox

# Some default env vars.
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct # change to qt6ct if you have that

input {

    # Указывает используемые раскладки клавиатуры
    kb_layout = us,ru

    #
    kb_variant =

    #
    kb_model =

    # Определяет горячие клавиши для смены языка
    kb_options = grp:win_space_toggle

    #
    kb_rules =

    #
    follow_mouse = 1

    touchpad {

        # Инверсия прокрутки для тачпада
        natural_scroll = true

        # Скорость прокрутки
        scroll_factor = 0.2
    }

    # Чувствительность курсора мыши. Значения от -1 до 1
    sensitivity = 0
}

general {

    # Размер границ у окон
    border_size = 1

    # Отключение границ для плавающих окон
    no_border_on_floating = true

    # Расстояние между окнами
    gaps_in = 5

    # Расстояние между окнами и краями монитора
    gaps_out = 10

    # Расстояние между рабочими столами
    gaps_workspaces = 0

    # Цвет границы для активных окон
    col.active_border = rgba(F7DCDE39)

    # Цвет границы для неактивных окон
    col.inactive_border = rgba(A58A8D30)

    # Способ создания окон ( master or dwindle )
    layout = dwindle # master or dwindle

    # Позволяет изменять размер окон с помощью перетаскивания границы окна
    resize_on_border = true

    allow_tearing = true
}

decoration {

    # Округление окон
    rounding = 10

    # Прозрачность активных окон
    active_opacity = 1

    # Прозрачность неактивных окон
    inactive_opacity = 1

    # Прозрачность для полноэкранных окон
    fullscreen_opacity = 1

    # Затемнять неактивные окна
    dim_inactive = true

    # Величина затемнения неактивных окон
    dim_strength = 0.4

    blur {
        # Включить размытие
        enabled = true

        # Величина размытия
        size = 6
    }
}

animations {

    enabled = yes

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {

    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this

}

gestures {

    # Включить пролистывание рабочего стола с помощью жестов
    workspace_swipe = true

}

misc {

    # Отключает случайный логотип Hyprland
    force_default_wallpaper = true

    # Анимация при изменении размера окна с помощью мыши
    animate_manual_resizes = true

}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
windowrulev2 = suppressevent maximize, class:.* # You'll probably like this.

exec-once = waybar
exec-once = hyprpaper

$mainMod = SUPER

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e-1
bind = $mainMod, mouse_up, workspace, e+1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod, B, exec, pkill -SIGUSR1 waybar
bind = $mainMod, W, exec, pkill -SIGUSR2 waybar
