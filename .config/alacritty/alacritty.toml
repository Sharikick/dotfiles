[env]
TERM = "xterm-256color"

[window]
padding.y = 0
padding.x = 0
dynamic_padding = true
opacity = 0.92

[font]
size = 12

# normal.family = "Hurmit Nerd Font"
# normal.family = "DankMono Nerd Font"
# normal.family = "OperatorMono Lig Book"
normal.family = "JetBrainsMono Nerd Font"
# normal.family = "DepartureMono Nerd Font"
# normal.family = "MonaSpiceRn Nerd Font" # Ne, Kr, Rn
normal.style = "Medium"

# bold.family = "Hurmit Nerd Font"
# bold.family = "OperatorMono Lig Book"
# bold.family = "DankMono Nerd Font"
bold.family = "JetBrainsMono Nerd Font"
# bold.family = "DepartureMono Nerd Font"
# bold.family = "MonaSpiceRn Nerd Font"
bold.style = "Bold"

# italic.family = "Hurmit Nerd Font"
# italic.family = "OperatorMono Lig Book"
# italic.family = "DankMono Nerd Font"
italic.family = "JetBrainsMono Nerd Font"
# italic.family = "DepartureMono Nerd Font"
# italic.family = "MonaSpiceRn Nerd Font"
italic.style = "Italic"

# bold_italic.family = "Hurmit Nerd Font"
# bold_italic.family = "OperatorMono Lig Book"
# bold_italic.family = "DankMono Nerd Font"
bold_italic.family = "JetBrainsMono Nerd Font"
# bold_italic.family = "DepartureMono Nerd Font"
# bold_italic.family = "MonaSpiceRn Nerd Font"
bold_italic.style = "Bold Italic"

# Binds

[[keyboard.bindings]]
action = "Paste"
key = "V"
mods = "Control"

[[keyboard.bindings]]
action = "Copy"
key = "C"
mods = "Control"

# Theme

[colors.primary]
background = "#1e1e2e"
foreground = "#cdd6f4"
dim_foreground = "#7f849c"
bright_foreground = "#cdd6f4"

[colors.cursor]
text = "#1e1e2e"
cursor = "#f5e0dc"

[colors.vi_mode_cursor]
text = "#1e1e2e"
cursor = "#b4befe"

[colors.search.matches]
foreground = "#1e1e2e"
background = "#a6adc8"

[colors.search.focused_match]
foreground = "#1e1e2e"
background = "#a6e3a1"

[colors.footer_bar]
foreground = "#1e1e2e"
background = "#a6adc8"

[colors.hints.start]
foreground = "#1e1e2e"
background = "#f9e2af"

[colors.hints.end]
foreground = "#1e1e2e"
background = "#a6adc8"

[colors.selection]
text = "#1e1e2e"
background = "#f5e0dc"

[colors.normal]
black = "#45475a"
red = "#f38ba8"
green = "#a6e3a1"
yellow = "#f9e2af"
blue = "#89b4fa"
magenta = "#f5c2e7"
cyan = "#94e2d5"
white = "#bac2de"

[colors.bright]
black = "#585b70"
red = "#f38ba8"
green = "#a6e3a1"
yellow = "#f9e2af"
blue = "#89b4fa"
magenta = "#f5c2e7"
cyan = "#94e2d5"
white = "#a6adc8"

[[colors.indexed_colors]]
index = 16
color = "#fab387"

[[colors.indexed_colors]]
index = 17
color = "#f5e0dc"
